<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Evgenia Lab</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
    }

    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
      overflow: hidden;
    }

    /* 실제 홈페이지 내용 */
    .main-content {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      position: relative;
      overflow: hidden;
      background:
        radial-gradient(circle at top, rgba(255,255,255,0.12), transparent 35%),
        linear-gradient(135deg, #111 0%, #1b1b1b 45%, #0b0b0b 100%);
      padding: 40px;
    }

    .main-content::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }

    .main-inner {
      position: relative;
      z-index: 1;
    }

    .tag {
      display: inline-block;
      padding: 8px 16px;
      margin-bottom: 18px;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 999px;
      font-size: 13px;
      letter-spacing: 2px;
      color: rgba(255,255,255,0.8);
      background: rgba(255,255,255,0.04);
      backdrop-filter: blur(4px);
    }

    .main-content h1 {
      font-size: 64px;
      letter-spacing: 3px;
      margin-bottom: 16px;
    }

    .main-content p {
      font-size: 20px;
      line-height: 1.7;
      color: rgba(255,255,255,0.72);
      max-width: 720px;
    }

    /* 퍼즐 오버레이 */
    .intro-overlay {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: grid;
      perspective: 1200px;
      background: transparent;
    }

    .tile {
      background: #000;
      border: 1px solid rgba(255,255,255,0.08);
      transform-style: preserve-3d;
      transform-origin: center center;
      backface-visibility: hidden;
      will-change: transform, opacity;
    }

    /* 조각이 사라지면서 그 자리가 바로 뚫림 */
    .tile.flip {
      animation: tileReveal 0.9s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }

    @keyframes tileReveal {
      0% {
        transform: rotateY(0deg) scale(1);
        opacity: 1;
      }
      45% {
        transform: rotateY(70deg) scale(0.98);
        opacity: 0.95;
      }
      100% {
        transform: rotateY(110deg) scale(0.88);
        opacity: 0;
      }
    }

    @media (max-width: 768px) {
      .main-content h1 {
        font-size: 42px;
      }

      .main-content p {
        font-size: 16px;
      }
    }
  </style>
</head>
<body>

  <!-- 실제 페이지 -->
  <main class="main-content">
    <div class="main-inner">
      <div class="tag">MY TECH ARCHIVE</div>
      <h1>Evgenia Lab</h1>
      <p>
        내가 공부한 기술과 프로젝트를 기록하는 공간입니다.
        HTML, CSS, JavaScript, Raspberry Pi, AI, 임베디드 시스템까지
        하나씩 쌓아가는 나만의 기술 페이지입니다.
      </p>
    </div>
  </main>

  <!-- 검은 퍼즐 조각 -->
  <div class="intro-overlay" id="intro"></div>

  <script>
    const intro = document.getElementById("intro");

    function createTiles() {
      intro.innerHTML = "";

      const cols = window.innerWidth <= 768 ? 10 : 20;
      const rows = window.innerWidth <= 768 ? 18 : 12;

      intro.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
      intro.style.gridTemplateRows = `repeat(${rows}, 1fr)`;

      for (let i = 0; i < cols * rows; i++) {
        const tile = document.createElement("div");
        tile.classList.add("tile");
        intro.appendChild(tile);
      }
    }

    function playIntro() {
      const tiles = document.querySelectorAll(".tile");

      tiles.forEach((tile, index) => {
        const delay = Math.random() * 900 + index * 10;

        setTimeout(() => {
          tile.classList.add("flip");
        }, delay);
      });

      const totalTime = tiles.length * 10 + 1200;

      setTimeout(() => {
        intro.remove();
        document.body.style.overflow = "auto";
      }, totalTime);
    }

    const visited = sessionStorage.getItem("introPlayed");

    createTiles();

    if (!visited) {
      sessionStorage.setItem("introPlayed", "true");
      playIntro();
    } else {
      intro.remove();
      document.body.style.overflow = "auto";
    }

    window.addEventListener("resize", () => {
      if (document.getElementById("intro")) {
        createTiles();
      }
    });
  </script>
</body>
</html>
